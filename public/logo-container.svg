<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="Pesisir logo">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Body container — persegi panjang landscape -->
  <rect x="4" y="14" width="40" height="24" rx="2" stroke="url(#g)" stroke-width="2.5"/>

  <!-- Tiga rusuk vertikal di dalam -->
  <line x1="17" y1="14" x2="17" y2="38" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="14" x2="24" y2="38" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
  <line x1="31" y1="14" x2="31" y2="38" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>

  <!-- Kaki container kiri dan kanan -->
</svg>
